version: '3.8'

services:
  contentcms-api:
    image: contentcms-api:latest
    container_name: contentcms-api
    restart: always
    ports:
      - "8080:8080"
    volumes:
      # Mount local images directory to /app/wwwroot/img in the container
      - ./images:/app/wwwroot/img
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - contentcms-network

networks:
  contentcms-network:
    driver: bridge

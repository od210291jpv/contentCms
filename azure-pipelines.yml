trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/ContentCms.API/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - src/ContentCms.API/**

stages:
  # Stage 1: Build and Deploy Docker Container Locally
  - stage: BuildAndDeploy
    displayName: 'Build and Deploy Docker Container'
    jobs:
      - job: BuildAndDeployJob
        displayName: 'Build and Run Container'
        pool:
          name: 'WindowsPool'
        
        steps:
          # Stop existing container if running (Idempotent check)
          - powershell: |
              $container = docker ps -a -q -f name=contentcms-api
              if ($container) {
                Write-Host "Found existing container. Stopping and removing..."
                docker stop contentcms-api
                docker rm contentcms-api
              } else {
                Write-Host "No existing container found. Proceeding with deployment."
              }
            displayName: 'Stop Existing Container'
          
          # Build Docker image locally
          - powershell: |
              docker build -t contentcms-api:latest -f "$(Build.SourcesDirectory)/src/ContentCms.API/Dockerfile" "$(Build.SourcesDirectory)/src"
            displayName: 'Build Docker Image'
          
          # Create persistent images directory on the host
          - powershell: |
              $storagePath = "C:\AppStorage\ContentCms\images"
              if (-not (Test-Path $storagePath)) {
                New-Item -ItemType Directory -Path $storagePath -Force
                Write-Host "Created persistent storage directory at $storagePath"
              }
            displayName: 'Create Persistent Images Directory'
          
          # Run Docker container mapping to the persistent directory
          - powershell: |
              docker run -d --name contentcms-api --restart always -p 8085:8080 -v "C:\AppStorage\ContentCms\images:/app/wwwroot/img" contentcms-api:latest
            displayName: 'Run Docker Container'
          
          # Verify container is running
          - powershell: |
              Start-Sleep -Seconds 5
              docker ps --filter "name=contentcms-api" --format "table {{.Names}}`t{{.Status}}"
            displayName: 'Verify Container Status'
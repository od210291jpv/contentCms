trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/ContentCms.API/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - src/ContentCms.API/**

stages:
  # Stage 1: Build and Deploy Docker Container Locally
  - stage: BuildAndDeploy
    displayName: 'Build and Deploy Docker Container'
    jobs:
      - job: BuildAndDeployJob
        displayName: 'Build and Run Container'
        pool:
          name: 'WindowsPool'
        
        steps:
          # Stop existing container if running (Idempotent check)
          - powershell: |
              $container = docker ps -a -q -f name=contentcms-api
              if ($container) {
                Write-Host "Found existing container. Stopping and removing..."
                docker stop contentcms-api
                docker rm contentcms-api
              } else {
                Write-Host "No existing container found. Proceeding with deployment."
              }
            displayName: 'Stop Existing Container'
          
          # Build Docker image locally
          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: 'build'
              dockerfile: '$(Build.SourcesDirectory)/src/ContentCms.API/Dockerfile'
              imageName: 'contentcms-api:latest'
              # Updated buildContext to "src" to allow correct path resolution in Dockerfile
              buildContext: '$(Build.SourcesDirectory)/src'
          
          # Create images directory for mounting
          - powershell: |
              if (-not (Test-Path "$(Build.SourcesDirectory)\images")) {
                New-Item -ItemType Directory -Path "$(Build.SourcesDirectory)\images" -Force
              }
            displayName: 'Create Images Directory'
          
          # Run Docker container with volume mount and auto-restart on port 8085
          - powershell: |
              docker run -d `
                --name contentcms-api `
                --restart always `
                -p 8085:8080 `
                -e ASPNETCORE_URLS="http://+:8080" 
                -e ASPNETCORE_ENVIRONMENT="Production"
                -v "$(Build.SourcesDirectory)\images:/app/wwwroot/img" `
                contentcms-api:latest
            displayName: 'Run Docker Container'
          
          # Verify container is running
          - powershell: |
              Start-Sleep -Seconds 5
              docker ps --filter "name=contentcms-api" --format "table {{.Names}}\t{{.Status}}"
            displayName: 'Verify Container Status'
